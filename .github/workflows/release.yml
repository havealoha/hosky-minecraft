name: Build & Release Hosky Minecraft Resource Packs
permissions:
  contents: write 
  
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Build Bedrock
        run: bash make-hosky-be.sh

      - name: Build Java
        run: bash make-hosky-je.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        with:
          tag_name: v-manual-${{ github.run_number }}   # creates tags like v-manual-5, v-manual-6...
          name: Hosky Packs (Manual Build ${{ github.run_number }})
          files: |
            Hosky_BE.zip
            Hosky_JE.zip
          generate_release_notes: true
          draft: false          # or true if you want to review first
          prerelease: true      # optional: mark as pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug before Pinata upload
        run: |
          pwd
          ls -la
          echo "Looking for:"
          ls -la Hosky_*.zip 2>/dev/null || echo "!!! No Hosky_*.zip files found !!!"
          if [ -f "Hosky_BE.zip" ]; then
            echo "Hosky_BE.zip exists → size: $(stat -c %s Hosky_BE.zip) bytes"
            file Hosky_BE.zip
          else
            echo "Hosky_BE.zip is MISSING"
          fi

      - name: Upload Bedrock (Hosky_BE.zip) to Pinata
        if: always()   # run even if debug fails, so we see output
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
        run: |
          set -x   # show commands as they run (vars masked)

          FILE="Hosky_BE.zip"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE does not exist in $(pwd)"
            ls -la
            exit 1
          fi

          echo "Uploading $FILE → size $(stat -c %s "$FILE") bytes"

          # Quick key check (length only, value stays secret)
          echo "API key length: ${#PINATA_API_KEY}"
          echo "Secret key length: ${#PINATA_SECRET_API_KEY}"

          curl -v -X POST https://api.pinata.cloud/pinning/pinFileToIPFS \
            -H "pinata_api_key: $PINATA_API_KEY" \
            -H "pinata_secret_api_key: $PINATA_SECRET_API_KEY" \
            -F file=@"$FILE" \
            -F 'pinataMetadata={"name": "Hosky_BE.zip"}' \
            | tee pinata_response.txt
          HASH=$(jq -r '.IpfsHash' pinata_response.txt 2>/dev/null || echo "")
          if [ -n "$HASH" ]; then
          echo "Pinned successfully!"
          echo "IPFS hash: $HASH"
          echo "Update Minecraft Geyser Bedrock Resource Pack URL to: https://ipfs.io/ipfs/$HASH/?filename=Hosky_BE.zip"
          else
          echo "Pinning failed - no IpfsHash in response"
          cat pinata_response.txt
          fi
       
          echo "=== Full Pinata response ==="
          cat pinata_response.txt

          # Try to show hash if successful
          if grep -q "IpfsHash" pinata_response.txt; then
            echo "Success! IPFS hash found."
          else
            echo "No IpfsHash → likely failed. Check above for error."
          fi

      - name: Upload Hosky_BE.zip to Filebase (S3) + Publish to IPNS
        env:
          FILEBASE_ACCESS_KEY: ${{ secrets.FILEBASE_ACCESS_KEY }}
          FILEBASE_SECRET_KEY: ${{ secrets.FILEBASE_SECRET_KEY }}
          FILEBASE_BUCKET:     ${{ secrets.FILEBASE_BUCKET }}
          FILEBASE_IPNS_KEY:   ${{ secrets.FILEBASE_IPNS_KEY }}   # e.g. "hosky-bedrock" or "k51q..."
        run: |
          set -euo pipefail
          set -x   # show commands (secrets masked)

          FILE="Hosky_BE.zip"
          OBJECT_KEY="Hosky_BE.zip"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE missing"
            ls -la
            exit 1
          fi

          echo "Uploading $FILE → ${FILEBASE_BUCKET}/${OBJECT_KEY}"
          echo "Key length: ${#FILEBASE_ACCESS_KEY} / ${#FILEBASE_SECRET_KEY}"

          # ────────────────────────────────────────────────
          # Upload via curl + AWS SigV4 (curl >=7.75 supports --aws-sigv4)
          # This works well in ubuntu-latest runner
          # ────────────────────────────────────────────────

          curl --progress-bar --fail-with-body \
            --aws-sigv4 "aws:amz::s3" \
            --user "${FILEBASE_ACCESS_KEY}:${FILEBASE_SECRET_KEY}" \
            -X PUT \
            -T "$FILE" \
            "https://s3.filebase.com/${FILEBASE_BUCKET}/${OBJECT_KEY}" \
            -H "Content-Type: application/zip" \
            | cat   # just to see output

          # Filebase returns the CID in x-amz-meta-cid or similar header on upload
          # But easier/safer: list object metadata or use head-object to get it

          echo "Fetching metadata to extract CID..."
          RESPONSE=$(curl --fail-with-body -sS -I \
            --aws-sigv4 "aws:amz::s3" \
            --user "${FILEBASE_ACCESS_KEY}:${FILEBASE_SECRET_KEY}" \
            "https://s3.filebase.com/${FILEBASE_BUCKET}/${OBJECT_KEY}" \
          )

          CID=$(echo "$RESPONSE" | grep -i '^x-amz-meta-cid:' | awk '{print $2}' | tr -d '\r')

          if [ -z "$CID" ]; then
            echo "ERROR: Could not extract CID from headers"
            echo "$RESPONSE"
            exit 1
          fi

          echo "New CID: $CID"

          # ────────────────────────────────────────────────
          # Publish to IPNS using Filebase RPC API
          # Requires Bearer token auth (your Filebase API key — same as access key in many cases)
          # ────────────────────────────────────────────────

          echo "Publishing /ipfs/$CID to IPNS key: $FILEBASE_IPNS_KEY"

          PUBLISH_RESPONSE=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer ${FILEBASE_ACCESS_KEY}" \
            "https://rpc.filebase.io/api/v0/name/publish?arg=/ipfs/${CID}&key=${FILEBASE_IPNS_KEY}" \
          )

          echo "$PUBLISH_RESPONSE" | jq .

          # Optional: parse Name & Value
          IPNS_NAME=$(echo "$PUBLISH_RESPONSE" | jq -r '.Name // empty')
          IPNS_VALUE=$(echo "$PUBLISH_RESPONSE" | jq -r '.Value // empty')

          if [ -n "$IPNS_VALUE" ]; then
            echo "Success! IPNS updated."
            echo "IPNS name: /ipns/$IPNS_NAME"
            echo "Points to: $IPNS_VALUE"
            echo "Gateway URL example: https://ipfs.filebase.io/ipns/$IPNS_NAME"
            echo "more likely only via https://frail-violet-porcupine.myfilebase.com/ipns/k51qzi5uqu5dm8tt21wl40l23sl6za2zi0gz9wixjs0efmabekdoey7eaib2p7"
            echo "Or use public gateways: https://ipfs.io/ipns/$IPNS_NAME  (may be slower)"
          else
            echo "IPNS publish failed:"
            echo "$PUBLISH_RESPONSE"
            exit 1
          fi
          
