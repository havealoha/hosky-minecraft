name: Build & Release Hosky Minecraft Resource Packs

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Build Bedrock
        run: bash make-hosky-be.sh

      - name: Build Java
        run: bash make-hosky-je.sh

      # Release only on tag push
      - name: Create Release & Upload Assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Hosky_BE.zip
            Hosky_JE.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pinata always (or make conditional)
      - name: Upload Bedrock to Pinata
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
        run: |
          # Install jq if needed for JSON parsing
          sudo apt-get install -y jq

          FILE="Hosky_BE.zip"   # ← change to whatever your script actually names it
          ls -l
          curl -X POST https://api.pinata.cloud/pinning/pinFileToIPFS \
            -H "pinata_api_key: $PINATA_API_KEY" \
            -H "pinata_secret_api_key: $PINATA_SECRET_API_KEY" \
            -F file=@"$FILE" \
            -F "pinataMetadata={\"name\": \"Hosky BE Pack v${GITHUB_REF#refs/tags/}\"}" \
            | jq -r '.IpfsHash' > ipfs_hash.txt
            ls -l

          echo "Bedrock pack pinned to IPFS: https://ipfs.io/ipfs/$(cat ipfs_hash.txt)"
          # Optional: also pinata-gateway or gateway.pinata.cloud link
